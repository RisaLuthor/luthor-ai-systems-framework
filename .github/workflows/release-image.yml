name: Release Image (Build + Push + Sign + Provenance)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: luthor-ai-systems-framework

jobs:
  build-push-sign:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Normalize GHCR path to lowercase (Cosign requires this)
      - name: Set image vars (lowercase)
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
          echo "IMAGE=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/${{ env.IMAGE_REPO }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # GitHub-native provenance attestation (shows up as "Attestations" in GH UI)
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}

      # Keyless signing (Cosign) using GitHub OIDC (no keys stored)
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign image digest (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes "$IMAGE"

      - name: Verify signature (sanity check)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE="${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/release-image.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"